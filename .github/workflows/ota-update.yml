name: OTA Update (EAS)

# Push a JS-only update over the air — no native rebuild needed.
# Targets devices running the matching native version (runtimeVersion = appVersion).
#
# Required secret: EXPO_TOKEN
#   → expo.dev → Account Settings → Access Tokens → Create token
#   → Add to GitHub repo: Settings → Secrets → Actions → EXPO_TOKEN
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'EAS Update channel / branch'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production
      message:
        description: 'Update message (shown in EAS dashboard)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  ota:
    name: EAS Update → ${{ inputs.branch }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: circlescare-expo/package-lock.json

      - name: Install dependencies
        working-directory: circlescare-expo
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Push OTA update
        working-directory: circlescare-expo
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas update \
            --branch "${{ inputs.branch }}" \
            --message "${{ inputs.message }}" \
            --non-interactive
