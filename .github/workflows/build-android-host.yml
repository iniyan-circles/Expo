name: Build Android Host

# Validates that the circlescare-android host app compiles against the
# published brownfield AAR. Runs on every push to main and on PRs.
# Also runnable manually to produce a QA or release APK for distribution.
#
# Credentials: settings.gradle.kts reads GITHUB_ACTOR + GITHUB_TOKEN env vars
# automatically — no extra secrets or gradle.properties setup needed in CI.
on:
  push:
    branches: [main]
    tags:
      - 'v*'
    paths:
      - 'circlescare-android/**'
      - 'circlescare-expo/app.json'
      - '.github/workflows/build-android-host.yml'
  pull_request:
    branches: [main]
    paths:
      - 'circlescare-android/**'
  workflow_dispatch:
    inputs:
      variant:
        description: 'Build variant'
        required: false
        default: 'release'
        type: choice
        options:
          - release
          - qa
          - debug

permissions:
  contents: read
  packages: read

jobs:
  build:
    name: assembleRelease + assembleQa
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-android-host-${{ hashFiles('circlescare-android/**/*.kts', 'circlescare-android/**/*.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-android-host-

      - name: Decode Keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$SIGNING_KEYSTORE_BASE64" ]; then
            mkdir -p circlescare-android
            echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > circlescare-android/circlescare-release.jks
          else
            echo "Warning: SIGNING_KEYSTORE_BASE64 is empty. Release build signing might fail."
          fi

      - name: Build release APK
        working-directory: circlescare-android
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Build QA APK
        working-directory: circlescare-android
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew assembleQa --no-daemon

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk-${{ github.run_number }}
          path: circlescare-android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14

      - name: Upload QA APK
        uses: actions/upload-artifact@v4
        with:
          name: android-qa-apk-${{ github.run_number }}
          path: circlescare-android/app/build/outputs/apk/qa/app-qa.apk
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            circlescare-android/app/build/outputs/apk/release/app-release.apk
            circlescare-android/app/build/outputs/apk/qa/app-qa.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
