name: Lint & Type Check

# PR quality gate for the Expo/RN source project.
# Blocks merge if TypeScript errors or lint violations are found.
on:
  push:
    branches: [main]
    paths:
      - 'circlescare-expo/**'
      - '.github/workflows/lint-typecheck.yml'
  pull_request:
    branches: [main]
    paths:
      - 'circlescare-expo/**'

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint + TypeScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: circlescare-expo/package-lock.json

      - name: Install dependencies
        working-directory: circlescare-expo
        run: npm install

      - name: TypeScript type check
        working-directory: circlescare-expo
        run: npx tsc --noEmit

      - name: Expo lint
        working-directory: circlescare-expo
        run: npm run lint
